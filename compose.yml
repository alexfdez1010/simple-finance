services:
  db:
    image: ankane/pgvector
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db
      - PGPORT=5434
    container_name: postgres_simple_finance
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - '5434:5434'
